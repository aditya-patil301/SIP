<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="container">
        <h1 onclick="changeColor()">Hello! Guys</h1>
        <div class="city">
            <p>We are present in INDORE.</p>
        </div>
    </div>
</body>

<script>
    const getId = document.getElementById("container");
    console.log(getId);

    const getClass = document.getElementsByClassName("city");
    console.log(getClass);

    const heading = document.getElementsByTagName("h1")[0];
    console.log(heading);

    let flag = 0;
    
    function changeColor(){
        if(flag === 0){
            heading.style.color = "red";
            flag = 1;
        } else {
            heading.style.color = "black";
            flag = 0;
        }
        
    }

</script>

</html>
