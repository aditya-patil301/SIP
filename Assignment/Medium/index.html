<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
    <nav>
        <div class="left">
            <i class="fa-solid fa-bars"></i>
            <h1>Medium</h1>

            <div class="searchBox">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Search">
            </div>
        </div>

        <div class="right">
            <button class="appBtn">
                <i class="fa-solid fa-qrcode"></i>
                Get app
            </button>

            <div class="write">
                <i class="fa-regular fa-pen-to-square"></i>
                <span>Write</span>
            </div>

            <i class="fa-regular fa-bell"></i>

            <div class="profile"></div>
        </div>
    </nav>


    <div class="container">
        <div class="sideBar">
            <div class="menu"><i class="fa-solid fa-house"></i><span>Home</span></div>
            <div class="menu"><i class="fa-regular fa-bookmark"></i><span>Library</span></div>
            <div class="menu"><i class="fa-regular fa-user"></i><span>Profile</span></div>
            <div class="menu"><i class="fa-regular fa-newspaper"></i><span>Stories</span></div>
            <div class="menu"><i class="fa-solid fa-chart-column"></i><span>Stats</span></div>
        </div>
    </div>

    <!-- <script src="https://kit.fontawesome.com/68bed586b4.js" crossorigin="anonymous"></script> -->
</body>

</html>
