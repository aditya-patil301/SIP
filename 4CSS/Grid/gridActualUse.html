        .container1{
            display: grid;
            height: 600px;
            gap: 15px;
            grid-template-areas: "sidebar header header head" 
                                 "sidebar main-content main-content side-content"
                                 "sidebar main-content main-content side-content"
                                 "footer footer footer footer";
            margin: 20px;
            padding: 20px;
        }

        .item{
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid black;
            border-radius: 10px;
        }

        .item_1{
            background-color: bisque;
            grid-area: head;
            transition: transform 1s ease-in-out;
        }

        .item_1:hover{
            transform: scale(1.05);
            background-color: black;
            color: white;
        }

        .item_2{
            background-color: rgb(140, 151, 219);
            grid-area: header;
            transition: transform 0.4s ease-in-out;
        }

        .item_2:hover{
            transform: scale(1.05);
            background-color: black;
            color: white;
        }

        .item_3{
            background-color: rgb(110, 207, 14);
            grid-area: sidebar;
            transition: transform 0.4s ease-in-out;
        }

        .item_3:hover{
            transform: scale(1.05);
            background-color: black;
            color: white;
        }

        .item_4{
            background-color: rgb(209, 174, 130);
            grid-area: side-content;
            transition: transform 0.4s ease-in-out;
        }

        .item_4:hover{
            transform: scale(1.05);
            background-color: black;
            color: white;
        }

        .item_5{
            background-color: rgb(210, 138, 179);
            grid-area: footer;
            transition: transform 0.4s ease-in-out;
        }

        .item_5:hover{
            transform: scale(1.05);
            background-color: black;
            color: white;
        }

        .item_6{
            background-color: rgb(21, 193, 205);
            grid-area: main-content;
            transition: transform 0.4s ease-in-out;
        }

        .item_6:hover{
            transform: scale(1.05);
            background-color: black;
            color: white;
        }

        @media (max-width: 1000px) and (min-width: 768px) {
            .container1{
                display: grid;
                grid-template-areas: "head"
                                     "header"
                                     "sidebar"
                                     "side-content"
                                     "main-content"
                                     "footer";
            }
        }

    </style>
