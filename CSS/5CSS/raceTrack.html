<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body{
            margin: 1px;
        }

        .container{
            height: 570px;
            border: 5px solid black ;
            background-color: black;
            /* display: grid;
            gap: 5px; */
        }

        .items{
            border: 2px solid black;
            height: 100px;
            width: 100px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0px;
            transition-duration: 5s;
        }

        .track1{
            background-color: brown;
            padding: 10px;
        }

        .track2{
            background-color: rgb(165, 165, 42);
            padding: 10px;
        }

        .track3{
            background-color: rgb(42, 155, 165);
            padding: 10px;
        }

        .track4{
            background-color: rgb(112, 42, 165);
            padding: 10px;
        }

        .container:hover .item1{
            transform: translateX(91vw);
            transition-timing-function: ease;
        }

        .container:hover .item2{
            transform: translateX(91vw);
            transition-timing-function: ease-in;
        }

        .container:hover .item3{
            transform: translateX(91vw);
            transition-timing-function: ease-in-out;
        }

        .container:hover .item4{
            transform: translateX(91vw);
            transition-timing-function: linear;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="track1">
            <div class="items item1">CAR 1</div>
        </div>
        <div class="track2">
            <div class="items item2">CAR 2</div>
        </div>
        <div class="track3">
            <div class="items item3">CAR 3</div>
        </div>
        <div class="track4">
            <div class="items item4">CAR 4</div>
        </div>
    </div>
</body>
</html>
