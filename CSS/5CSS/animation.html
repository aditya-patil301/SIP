<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <style>
        *{
            background-color: black;
            padding: 20px;
        }

        .container{
            height: 79vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .items{
            border: 5px solid white;
            border-bottom-color: transparent;
            border-top-left-radius: 10px dotted white;
            background-color: red;
            height: 100px;
            width: 100px;
            border-radius: 50%;
            margin: 0px;
            animation: moveBox 0.4s ease-in-out infinite;
        }

        @keyframes moveBox{
            /* from { 
                transform: rotate(0deg);
            } 
            to {
                transform: rotate(360deg);
            } */
            100% {
                transform: rotate(360deg);
            } 
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="items item1"></div>
    </div>
</body>
</html>
