<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actual use of grid</title>
    <style>
        .container{
            display: grid;
            /* grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(3,1fr); */
            border: 2px solid black;
            height: 100%;
            padding: 10px;
            gap: 20px;
        }

        .items{
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid black;
        }

        .item1{
            height: 50px;
            grid-column-start: 1;
            grid-column-end: 3;
        }

        .item2{
            grid-column-start: 1;
            grid-column-end: 2;
            height: 100px;
        }

        .item3{
            grid-column-start: 2;
            grid-column-end: 3;
            height: 100px;
        }

        .item4{
            height: 50px;
            grid-column-start: 1;
            grid-column-end: 3;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="items item1">Box 01</div>
        <div class="items item2">Box 02</div>
        <div class="items item3">Box 03</div>
        <div class="items item4">Box 04</div>
        <!-- <div class="items item5">Box 05</div> -->
    </div>
</body>
</html>
